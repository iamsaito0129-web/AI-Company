<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dash | AI-Company</title>
    <meta name="description" content="AI-Company 自律型金融エージェント・ダッシュボード。行動経済学に基づいた資産管理を実現。">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <!-- Hero Section: Safe-to-Spend -->
        <section class="hero-section animate-fade-in" id="hero">
            <div class="safe-to-spend-card" id="sts-card">
                <div class="act-badge">
                    <span>✨</span> ACT 950
                </div>
                <h2 class="label-main">Safe-to-Spend</h2>
                <div class="amount-main" id="safe-to-spend-amount">
                    <span class="currency">¥</span>0
                </div>
                <p style="color: var(--text-muted); margin-top: 1rem;">今月あとこれだけ使えます</p>
            </div>
        </section>

        <!-- Stats Grid -->
        <section class="stats-grid animate-fade-in" style="animation-delay: 0.2s;">
            <div class="stat-card" id="card-networth">
                <div class="stat-label">純資産 (Net Worth)</div>
                <div class="stat-value" id="stat-networth">¥ 0</div>
            </div>
            <div class="stat-card" id="card-bank">
                <div class="stat-label">銀行残高 (Bank Main)</div>
                <div class="stat-value" id="stat-bank">¥ 0</div>
            </div>
            <div class="stat-card" id="card-digital">
                <div class="stat-label">デジタル資産 (Digital)</div>
                <div class="stat-value" id="stat-digital">¥ 0</div>
            </div>
        </section>

        <!-- Main Chart Section -->
        <section class="content-section animate-fade-in" style="animation-delay: 0.4s;">
            <h3 class="section-header"><span>📈</span> Asset Trajectory</h3>
            <div class="chart-wrapper">
                <canvas id="mainChart"></canvas>
            </div>
        </section>
    </div>

    <!-- Floating Quick Actions -->
    <nav class="quick-actions" id="main-nav">
        <button class="action-btn" onclick="location.reload()">Home</button>
        <button class="action-btn">History</button>
        <button class="action-btn primary" id="btn-add">Add Entry</button>
        <button class="action-btn">Audit</button>
        <button class="action-btn">Import</button>
    </nav>

    <!-- Scripts -->
    <script src="main.js"></script>
</body>
</html>
