<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Route Puzzle - Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-layer {
            position: absolute;
            z-index: 10;
            pointer-events: none;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .interactive {
            pointer-events: auto;
        }

        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="text-slate-100">

    <div id="canvas-container"></div>

    <div class="ui-layer p-6">
        <div class="flex justify-between items-start">
            <div class="interactive glass p-6 rounded-2xl shadow-2xl max-w-sm">
                <h1
                    class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-fuchsia-400 bg-clip-text text-transparent mb-2">
                    3D Route Puzzle: Solution</h1>
                <p class="text-sm text-slate-300 leading-relaxed">
                    解析の結果、最短ルートを特定しました。<br>
                    <span class="text-fuchsia-400 font-bold">ピンク色</span> のラインが解答のルートです。
                </p>
                <div class="mt-4 flex gap-2">
                    <button onclick="toggleNumbers()"
                        class="bg-indigo-600/50 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-full transition-all border border-indigo-400/30">
                        🔢 番号表示切替
                    </button>
                    <button onclick="resetCamera()"
                        class="bg-slate-700/50 hover:bg-slate-600 text-white text-xs px-4 py-2 rounded-full transition-all border border-slate-500/30">
                        🔄 視点リセット
                    </button>
                </div>
            </div>
        </div>

        <div
            class="interactive glass p-4 rounded-full self-center mb-8 flex gap-6 px-8 items-center border border-white/10 shadow-2xl">
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <span class="text-xs font-semibold text-green-300">START: 233</span>
            </div>
            <div class="w-px h-4 bg-slate-600"></div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-red-500"></div>
                <span class="text-xs font-semibold text-red-300">GOAL: 77</span>
            </div>
            <div class="w-px h-4 bg-slate-600"></div>
            <div class="flex items-center gap-2">
                <div class="w-3 h-3 rounded-full bg-fuchsia-500"></div>
                <span class="text-xs font-semibold text-fuchsia-300">SOLUTION PATH</span>
            </div>
        </div>
    </div>

    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color('#0f172a');

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 15);
        scene.add(dirLight);

        const materials = {
            white: new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3, metalness: 0.1 }),
            lightblue: new THREE.MeshStandardMaterial({ color: 0x38bdf8, roughness: 0.2 }),
            yellow: new THREE.MeshStandardMaterial({ color: 0xfbbf24, roughness: 0.2 }),
            route: new THREE.MeshStandardMaterial({ color: 0xd946ef, roughness: 0.2, emissive: 0xd946ef, emissiveIntensity: 0.2 }),
            start: new THREE.MeshStandardMaterial({ color: 0x22c55e, roughness: 0.2 }),
            goal: new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2 })
        };

        let blockGroup = new THREE.Group();
        let blocks = [];
        let numberPlanes = [];
        let faceMapping = {};

        function generateGrid(w, h, d) {
            let faceIdCounter = 1;
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x475569, opacity: 0.3, transparent: true });

            for (let x = 0; x < w; x++) {
                for (let y = 0; y < h; y++) {
                    for (let z = 0; z < d; z++) {
                        const isOuterSurface = (x === 0 || x === w - 1 || y === 0 || y === h - 1 || z === 0 || z === d - 1);
                        if (isOuterSurface) {
                            const mesh = new THREE.Mesh(geometry, Array(6).fill(materials.white));
                            mesh.position.set(x - w / 2 + 0.5, y - h / 2 + 0.5, z - d / 2 + 0.5);
                            mesh.userData = { x, y, z, faceTypes: Array(6).fill('white') };
                            mesh.add(new THREE.LineSegments(edges, lineMat));

                            for (let i = 0; i < 6; i++) {
                                let outside = (i === 0 && x === w - 1) || (i === 1 && x === 0) || (i === 2 && y === h - 1) || (i === 3 && y === 0) || (i === 4 && z === d - 1) || (i === 5 && z === 0);
                                if (outside) {
                                    const canvas = document.createElement('canvas');
                                    canvas.width = 128; canvas.height = 128;
                                    const ctx = canvas.getContext('2d');
                                    ctx.fillStyle = 'rgba(15, 23, 42, 0.8)';
                                    ctx.font = 'bold 44px Inter';
                                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                                    ctx.fillText(faceIdCounter, 64, 64);

                                    const tex = new THREE.CanvasTexture(canvas);
                                    const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, depthWrite: false });
                                    const plane = new THREE.Mesh(new THREE.PlaneGeometry(0.7, 0.7), mat);
                                    if (i === 0) { plane.position.set(0.505, 0, 0); plane.rotation.y = Math.PI / 2; }
                                    else if (i === 1) { plane.position.set(-0.505, 0, 0); plane.rotation.y = -Math.PI / 2; }
                                    else if (i === 2) { plane.position.set(0, 0.505, 0); plane.rotation.x = -Math.PI / 2; }
                                    else if (i === 3) { plane.position.set(0, -0.505, 0); plane.rotation.x = Math.PI / 2; }
                                    else if (i === 4) { plane.position.set(0, 0, 0.505); }
                                    else if (i === 5) { plane.position.set(0, 0, -0.505); plane.rotation.y = Math.PI; }

                                    mesh.add(plane);
                                    numberPlanes.push(plane);
                                    faceMapping[faceIdCounter] = { x, y, z, face: i };
                                    faceIdCounter++;
                                }
                            }
                            blockGroup.add(mesh);
                            blocks.push(mesh);
                        }
                    }
                }
            }
            scene.add(blockGroup);
            resetCamera();
            applyConfig();
        }

        function applyConfig() {
            const initial = {
                start: [233],
                goal: [77],
                yellow: [63, 69, 235, 73, 48, 16, 33, 94, 202, 199, 196, 232, 17, 147, 154, 241],
                lightblue: [243, 108, 79, 98, 128, 158, 226, 224, 221, 219, 214, 212, 209, 207, 231, 194, 49, 50, 51, 54, 56, 37, 38, 39, 42, 44, 2, 114],
                route: [233, 235, 237, 239, 241, 240, 238, 236, 234, 232, 229, 217, 205, 193, 195, 196, 197, 198, 199, 200, 201, 202, 188, 186, 184, 182, 199, 198, 197, 196, 176, 177, 144, 145, 146, 147, 148, 149, 150, 151, 152, 154, 124, 94, 34, 33, 20, 18, 16, 17, 15, 14, 30, 29, 28, 27, 26, 25, 23, 35, 47, 48, 97, 95, 93, 82, 81, 83, 84, 85, 115, 116, 117, 147, 183, 185, 187, 189, 191, 190, 203, 215, 227, 248, 249, 169, 139, 138, 137, 107, 75, 73, 71, 69, 67, 65, 63, 101, 102, 103, 104, 69, 68, 70, 72, 73, 75, 77]
            };
            for (const [type, nums] of Object.entries(initial)) {
                nums.forEach(n => {
                    const m = faceMapping[n];
                    if (m) {
                        const b = blocks.find(bl => bl.userData.x === m.x && bl.userData.y === m.y && bl.userData.z === m.z);
                        if (b) {
                            b.material[m.face] = materials[type];
                            b.material = [...b.material];
                        }
                    }
                });
            }
        }

        function resetCamera() {
            camera.position.set(8, 10, 12);
            controls.target.set(0, 0, 0);
            controls.update();
        }

        let numsVisible = false;
        window.toggleNumbers = () => {
            numsVisible = !numsVisible;
            numberPlanes.forEach(p => p.visible = numsVisible);
        };

        generateGrid(5, 5, 10);
        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
