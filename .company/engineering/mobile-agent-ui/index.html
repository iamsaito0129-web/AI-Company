<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity Mobile Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
            --accent-glow: linear-gradient(90deg, #8b5cf6, #3b82f6);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        .container {
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        header {
            margin-bottom: 32px;
            padding-top: 20px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s ease;
        }

        .card:active {
            transform: scale(0.98);
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 16px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .task-item:last-child {
            border-bottom: none;
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: transparent;
        }

        .task-text {
            flex: 1;
            font-size: 16px;
        }

        .task-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .input-bar {
            position: fixed;
            bottom: 24px;
            left: 24px;
            right: 24px;
            max-width: calc(500px - 48px);
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        }

        .input-bar input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            font-size: 16px;
            outline: none;
        }

        .send-btn {
            background: var(--accent-glow);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
        }

        .floating-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body>
    <div class="floating-particles"></div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>Antigravity</h1>
                <div class="status-badge">
                    <div class="status-dot"></div>
                    Online
                </div>
            </div>
            <p style="color: var(--text-secondary); font-size: 14px; margin-top: 8px;">こんにちは、オーナー</p>
        </header>

        <section class="card">
            <h2 class="section-title">Today's Focus</h2>
            <div class="task-item">
                <div class="task-checkbox"></div>
                <div class="task-text">卒業式後の飲み会打合せ</div>
                <div class="task-time">17:00</div>
            </div>
            <div class="task-item">
                <div class="task-checkbox"></div>
                <div class="task-text">3Dパズルロジック検証</div>
                <div class="task-time">Anytime</div>
            </div>
        </section>

        <section class="card">
            <h2 class="section-title">Active Projects</h2>
            <div style="display: flex; flex-direction: column; gap: 12px;">
                <div style="font-size: 15px;">Mobile Controller <span style="font-size: 12px; color: #8b5cf6;">In Progress</span></div>
                <div style="height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px;">
                    <div style="width: 35%; height: 100%; background: var(--accent-glow); border-radius: 3px;"></div>
                </div>
            </div>
        </section>
    </div>

    <div class="input-bar">
        <input type="text" placeholder="指示を入力してください...">
        <button class="send-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
    </div>
</body>
</html>
